<style>
  body {
    font-family: Helvetica, Arial, sans-serif;
    background: #fff;

    max-width: 38em;

  .page { font-size: 20px; }
  h1 { font-size: 1.3em; border-bottom: 2px solid #000; padding-bottom: .3em; margin-bottom: .3em; }
  h2 { font-size: 1.1em; margin-top: 1.6em; border-bottom: 1px solid #000; padding-bottom: .2em; }
  h3 { font-size: 1.05em; margin-bottom: .2em; }
  p { margin: .4em 0; }
  .meta { color: #333; font-size: .85em; margin-bottom: 1em; }
  .summary { margin: 0 0 .3em 0; white-space: pre-line; }
  .summary.secondary { color: #333; border-top: 1px dashed #999; padding-top: .3em; margin-top: .3em; }
  .fulltext { margin: .8em 0; }
  .brief { border: 1px solid #000; padding: .5em .8em; margin: 0 0 1.4em 0; }
  .brief-label { font-size: .75em; font-weight: bold; letter-spacing: .15em; margin: 0 0 .3em 0; }

  a { color: #000; }
  article { margin-bottom: 1.4em; padding-bottom: 1em; border-bottom: 1px dashed #999; }
  ul.toc { padding-left: 1.1em; }
  ul.toc li { margin: .3em 0; }

  .fontsize { font-size: 16px; margin: 0 0 1em 0; }
  .fontsize a {
    display: inline-block;
    min-width: 1.6em;
    padding: .2em .4em;
    margin-right: .4em;
    border: 1px solid #000;
    text-align: center;
    text-decoration: none;
  }
  #font-anchor-small, #font-anchor-medium, #font-anchor-large { display: none; }
  #font-anchor-small:target ~ .page { font-size: 16px; }
  #font-anchor-large:target ~ .page { font-size: 26px; }

  .fontswitch { font-size: 16px; margin: 0 0 1em 0; }
  .fontswitch a { text-decoration: underline; }

  .qa { margin: .5em 0 0 0; }
  .qa details { margin: .35em 0; border: 1px solid #999; padding: .4em .6em; }
  .qa summary { cursor: pointer; font-size: .9em; }
  .qa p { margin: .4em 0 0 0; font-size: .9em; }

# Kindle AI Daily Digest configuration

# Language the AI should write summaries in (any language name/code works,
# it's just fed into the prompt). Also used for a couple of UI labels.
language: zh-TW

# Optional second language for side-by-side bilingual summaries — each
# article shows its summary in `language` and again in this one, turning the
# digest into a light reading/study aid. Leave blank/null to keep it off.
secondary_language: null
# secondary_language: en

# IANA timezone used to stamp each day's digest.
timezone: Asia/Taipei

# Max number of articles pulled from each feed per run. Keep this low if
# you're on the Gemini free tier — it caps gemini-2.5-flash at 5 requests
# per minute, and total feeds x this number = requests per run.
max_articles_per_feed: 3

# How many days of past digests to keep under docs/archive/. Older dated
# pages get deleted on each run so the archive doesn't grow forever. Set
# to 0 to keep everything.
archive_retention_days: 60

# How many days to remember an article's URL so it isn't summarized again
# if it lingers near the top of a feed on later runs. Also used as the
# window for skipping cross-feed duplicates picked up in earlier runs.
# State is kept in .digest-state/seen.json.
seen_retention_days: 14

# Number of questions in the daily recall quiz (docs/quiz.html), generated
# from the previous day's articles so you can test what you remember. Set to
# 0 to turn the quiz off.
quiz_questions: 4

# Split each offline full-text page into several sequential pages so you can
# turn pages on Kindle (one clean e-ink refresh per turn, landing at the top)
# instead of scrolling the slow screen. Each page is its own static HTML file
# with plain "上一頁 / 下一頁" links — still no JavaScript. Set to false to keep
# the old single long scrolling page.
paginate_articles: true

# Roughly how many on-screen text lines to fit per page when paginate_articles
# is on. Lower = shorter pages / more page turns; higher = longer pages. 14 is
# about one Kindle screen at the default font size. Whole paragraphs are never
# split across a page break.
article_page_lines: 14

# Show an AI "editor's brief" at the top of each day's digest: one short
# paragraph tying together the day's stories. Set to false to turn it off.
editor_brief: true

# Pick the meatiest article of the day and generate a longer "deep read"
# companion (background, key points, implications, mini-glossary) on its own
# page (docs/deepread.html). Set to false to turn it off.
deep_read: true

# Once a week, group the past 7 days of articles into themes and write a
# longer roundup essay on its own page (docs/weekly.html). Set weekly_roundup
# to false to turn it off. weekly_roundup_weekday is the day it's generated:
# 0 = Monday ... 6 = Sunday.
weekly_roundup: true
weekly_roundup_weekday: 6

# Keywords you care about. Articles whose title or summary mention more of
# these get sorted first within their category (English/Chinese both work,
# matching is case-insensitive substring). Leave empty to keep RSS order.
interests: []
# interests:
#   - AI
#   - 台灣
#   - climate

# LLM provider used for summarization: "gemini" (Google Gemini API) or
# "openai" (OpenAI, or any OpenAI-compatible endpoint via openai_base_url).
provider: gemini

# Model name. Examples:
#   gemini -> gemini-2.5-flash, gemini-2.5-pro
#   openai -> gpt-4o-mini, gpt-4o, or whatever your compatible endpoint serves
model: gemini-2.5-flash

# Only used when provider: openai. Leave commented out to use api.openai.com.
# Point this at any OpenAI-compatible endpoint (OpenRouter, local vLLM, a
# self-hosted gateway, etc).
# openai_base_url: https://api.openai.com/v1

# RSS/Atom feeds to digest. Add or remove entries freely.
feeds:
  - name: Hacker News
    url: https://hnrss.org/frontpage
    category: 科技 Tech

  - name: BBC World News
    url: http://feeds.bbci.co.uk/news/world/rss.xml
    category: 國際 World

  - name: NASA Breaking News
    url: https://www.nasa.gov/news-release/feed/
    category: 科學 Science

  # Long-form essays — great for slow e-ink reading via the offline full-text
  # pages. Trim max_articles_per_feed or drop these if you want a lighter run.
  - name: Quanta Magazine
    url: https://api.quantamagazine.org/feed/
    category: 長文 Long Reads

  - name: Aeon
    url: https://aeon.co/feed.rss
    category: 長文 Long Reads
